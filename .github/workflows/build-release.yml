name: Build JARVIS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  # ─── Build Windows .exe ──────────────────────────────────────────────────
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Patch pnpm-workspace.yaml for CI (keep catalog, remove platform overrides)
        shell: bash
        run: |
          cat > pnpm-workspace.yaml << 'WSEOF'
          packages:
            - artifacts/*
            - lib/*
            - scripts
          catalog:
            '@replit/vite-plugin-cartographer': ^0.5.1
            '@replit/vite-plugin-dev-banner': ^0.1.1
            '@replit/vite-plugin-runtime-error-modal': ^0.0.6
            '@tailwindcss/vite': ^4.1.14
            '@tanstack/react-query': ^5.90.21
            '@types/node': ^25.3.3
            '@types/react': ^19.2.0
            '@types/react-dom': ^19.2.0
            '@vitejs/plugin-react': ^5.0.4
            class-variance-authority: ^0.7.1
            clsx: ^2.1.1
            drizzle-orm: ^0.45.2
            framer-motion: ^12.23.24
            lucide-react: ^0.545.0
            react: 19.1.0
            react-dom: 19.1.0
            tailwind-merge: ^3.3.1
            tailwindcss: ^4.1.14
            tsx: ^4.21.0
            vite: ^7.3.2
            wouter: ^3.3.5
            zod: ^3.25.76
          autoInstallPeers: false
          onlyBuiltDependencies:
            - '@swc/core'
            - esbuild
            - msw
          WSEOF

      - name: Install pnpm deps
        run: pnpm install --no-frozen-lockfile

      - name: Build React UI
        run: pnpm --filter @workspace/jarvis-ui run build

      - name: Install Python deps
        run: pip install -r desktop/requirements.txt pyinstaller
        continue-on-error: true

      - name: Build Python core .exe
        working-directory: desktop
        run: python build_windows.py
        continue-on-error: true

      - name: Install Electron deps
        working-directory: electron
        run: npm install

      - name: Build Electron Windows installer
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-Windows
          path: electron/dist-app/*.exe
          if-no-files-found: warn
          retention-days: 30

  # ─── Build macOS .dmg ────────────────────────────────────────────────────
  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Patch pnpm-workspace.yaml for CI
        run: |
          cat > pnpm-workspace.yaml << 'WSEOF'
          packages:
            - artifacts/*
            - lib/*
            - scripts
          catalog:
            '@replit/vite-plugin-cartographer': ^0.5.1
            '@replit/vite-plugin-dev-banner': ^0.1.1
            '@replit/vite-plugin-runtime-error-modal': ^0.0.6
            '@tailwindcss/vite': ^4.1.14
            '@tanstack/react-query': ^5.90.21
            '@types/node': ^25.3.3
            '@types/react': ^19.2.0
            '@types/react-dom': ^19.2.0
            '@vitejs/plugin-react': ^5.0.4
            class-variance-authority: ^0.7.1
            clsx: ^2.1.1
            drizzle-orm: ^0.45.2
            framer-motion: ^12.23.24
            lucide-react: ^0.545.0
            react: 19.1.0
            react-dom: 19.1.0
            tailwind-merge: ^3.3.1
            tailwindcss: ^4.1.14
            tsx: ^4.21.0
            vite: ^7.3.2
            wouter: ^3.3.5
            zod: ^3.25.76
          autoInstallPeers: false
          onlyBuiltDependencies:
            - '@swc/core'
            - esbuild
            - msw
          WSEOF

      - name: Install pnpm deps
        run: pnpm install --no-frozen-lockfile

      - name: Build React UI
        run: pnpm --filter @workspace/jarvis-ui run build

      - name: Install Python deps
        run: pip3 install -r desktop/requirements.txt pyinstaller
        continue-on-error: true

      - name: Build Python core (macOS)
        working-directory: desktop
        run: python3 build_windows.py
        continue-on-error: true

      - name: Install Electron deps
        working-directory: electron
        run: npm install

      - name: Build Electron macOS DMG
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-macOS
          path: electron/dist-app/*.dmg
          if-no-files-found: warn
          retention-days: 30

  # ─── Build Linux AppImage ────────────────────────────────────────────────
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install system deps
        run: sudo apt-get install -y python3-pip python3-dev portaudio19-dev

      - name: Patch pnpm-workspace.yaml for CI
        run: |
          cat > pnpm-workspace.yaml << 'WSEOF'
          packages:
            - artifacts/*
            - lib/*
            - scripts
          catalog:
            '@replit/vite-plugin-cartographer': ^0.5.1
            '@replit/vite-plugin-dev-banner': ^0.1.1
            '@replit/vite-plugin-runtime-error-modal': ^0.0.6
            '@tailwindcss/vite': ^4.1.14
            '@tanstack/react-query': ^5.90.21
            '@types/node': ^25.3.3
            '@types/react': ^19.2.0
            '@types/react-dom': ^19.2.0
            '@vitejs/plugin-react': ^5.0.4
            class-variance-authority: ^0.7.1
            clsx: ^2.1.1
            drizzle-orm: ^0.45.2
            framer-motion: ^12.23.24
            lucide-react: ^0.545.0
            react: 19.1.0
            react-dom: 19.1.0
            tailwind-merge: ^3.3.1
            tailwindcss: ^4.1.14
            tsx: ^4.21.0
            vite: ^7.3.2
            wouter: ^3.3.5
            zod: ^3.25.76
          autoInstallPeers: false
          onlyBuiltDependencies:
            - '@swc/core'
            - esbuild
            - msw
          WSEOF

      - name: Install pnpm deps
        run: pnpm install --no-frozen-lockfile

      - name: Build React UI
        run: pnpm --filter @workspace/jarvis-ui run build

      - name: Install Python deps
        run: pip3 install -r desktop/requirements.txt pyinstaller
        continue-on-error: true

      - name: Build Python core (Linux)
        working-directory: desktop
        run: python3 build_windows.py
        continue-on-error: true

      - name: Install Electron deps
        working-directory: electron
        run: npm install

      - name: Build Linux AppImage
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-Linux
          path: electron/dist-app/*.AppImage
          if-no-files-found: warn
          retention-days: 30

  # ─── Create GitHub Release ───────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: List release assets
        run: find release-assets -type f 2>/dev/null || echo "No assets found"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "JARVIS v${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## JARVIS AI Ассистент v${{ steps.get_version.outputs.VERSION }}

            ### Установка

            | Платформа | Файл |
            |-----------|------|
            | Windows 10/11 | JARVIS-Setup-*.exe |
            | macOS 12+ | JARVIS-*.dmg |
            | Linux | JARVIS-*.AppImage |

            ### Первый запуск
            1. Скачайте установщик для своей платформы
            2. Запустите установщик (Windows: нажмите "Всё равно запустить" в SmartScreen)
            3. JARVIS появится в системном трее
            4. Установите Ollama: https://ollama.ai → `ollama pull llama3:8b`
            5. Скажите **«Джарвис»** для активации или нажмите **Ctrl+Shift+J**

            ### Лицензия
            - Демо-ключ: `JARVIS-DEMO-TEST-2024`
            - Пробная (30 дней): `JARVIS-XXXX-XXXX-XXXX`
            - Постоянная: `JARVIS-PERM-XXXX-XXXX`
          files: |
            release-assets/**/*.exe
            release-assets/**/*.dmg
            release-assets/**/*.AppImage
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
