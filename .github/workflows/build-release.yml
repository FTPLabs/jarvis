name: Build JARVIS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.0.2)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Patch pnpm-workspace.yaml for CI
        shell: bash
        run: cp ci-pnpm-workspace.yaml pnpm-workspace.yaml

      - name: Install pnpm deps
        run: pnpm install --no-frozen-lockfile

      - name: Build API Server
          run: pnpm --filter @workspace/api-server run build

        - name: Copy API Server to Electron resources
          run: |
            mkdir -p electron/api-server
            cp artifacts/api-server/dist/index.js electron/api-server/

        - name: Build React UI
        run: pnpm --filter @workspace/jarvis-ui run build
        env:
          BASE_PATH: "./"

      - name: Copy React UI to Electron renderer
        shell: bash
        run: |
          mkdir -p electron/renderer
          cp -r artifacts/jarvis-ui/dist/public/. electron/renderer/

      - name: Install Pillow for icon generation
        run: pip install pillow

      - name: Generate JARVIS icons
        run: python scripts/make_icon.py electron/assets

      - name: Verify icons exist
        shell: bash
        run: |
          echo "Icons check:"
          ls -la electron/assets/ || true
          test -f electron/assets/jarvis.ico || (echo "ERROR: jarvis.ico not found" && exit 1)
          test -f electron/assets/tray-icon.png || (echo "ERROR: tray-icon.png not found" && exit 1)
          echo "All icons OK"

      - name: Install PyInstaller
        run: pip install setuptools wheel pyinstaller
        continue-on-error: true

      - name: Install Python app deps
        run: pip install -r desktop/requirements.txt
        continue-on-error: true

      - name: Install Electron deps
        working-directory: electron
        run: npm install

      - name: Build Electron Windows installer
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-Windows
          path: |
            electron/dist-app/*.exe
            electron/dist-app/*.blockmap
            electron/dist-app/latest.yml

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Patch pnpm-workspace.yaml for CI
        run: cp ci-pnpm-workspace.yaml pnpm-workspace.yaml

      - name: Install pnpm deps
        run: pnpm install --no-frozen-lockfile

      - name: Build API Server
          run: pnpm --filter @workspace/api-server run build

        - name: Copy API Server to Electron resources
          run: |
            mkdir -p electron/api-server
            cp artifacts/api-server/dist/index.js electron/api-server/

        - name: Build React UI
        run: pnpm --filter @workspace/jarvis-ui run build
        env:
          BASE_PATH: "./"

      - name: Copy React UI to Electron renderer
        run: |
          mkdir -p electron/renderer
          cp -r artifacts/jarvis-ui/dist/public/. electron/renderer/

      - name: Install Pillow and generate icons
        run: pip install pillow && python scripts/make_icon.py electron/assets

      - name: Install Electron deps
        working-directory: electron
        run: npm install

      - name: Build Electron macOS DMG
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:mac

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-macOS
          path: |
            electron/dist-app/*.dmg
            electron/dist-app/*.blockmap
            electron/dist-app/latest-mac.yml

  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Patch pnpm-workspace.yaml for CI
        run: cp ci-pnpm-workspace.yaml pnpm-workspace.yaml

      - name: Install pnpm deps
        run: pnpm install --no-frozen-lockfile

      - name: Build API Server
          run: pnpm --filter @workspace/api-server run build

        - name: Copy API Server to Electron resources
          run: |
            mkdir -p electron/api-server
            cp artifacts/api-server/dist/index.js electron/api-server/

        - name: Build React UI
        run: pnpm --filter @workspace/jarvis-ui run build
        env:
          BASE_PATH: "./"

      - name: Copy React UI to Electron renderer
        run: |
          mkdir -p electron/renderer
          cp -r artifacts/jarvis-ui/dist/public/. electron/renderer/

      - name: Install Pillow and generate icons
        run: pip install pillow && python scripts/make_icon.py electron/assets

      - name: Install Electron deps
        working-directory: electron
        run: npm install

      - name: Build Electron Linux AppImage
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:linux

      - name: Upload Linux installer
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-Linux
          path: |
            electron/dist-app/*.AppImage
            electron/dist-app/latest-linux.yml

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release files
        run: find release-artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.exe
            release-artifacts/*.dmg
            release-artifacts/*.AppImage
            release-artifacts/*.blockmap
            release-artifacts/*.yml
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}