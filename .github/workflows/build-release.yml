name: Build JARVIS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.1.0)"
        required: true
        default: "v1.1.0"

permissions:
  contents: write

jobs:
  # ─── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: 🪟 Windows Installer (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Patch workspace for CI (no Replit plugins)
        shell: bash
        run: cp ci-pnpm-workspace.yaml pnpm-workspace.yaml

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build API Server
        run: pnpm --filter @workspace/api-server run build

      - name: Copy API Server → electron/api-server
        shell: bash
        run: |
          mkdir -p electron/api-server
          cp artifacts/api-server/dist/index.js electron/api-server/

      - name: Build React UI (BASE_PATH=./ for file:// protocol)
        run: pnpm --filter @workspace/jarvis-ui run build
        env:
          BASE_PATH: "./"

      - name: Copy React UI → electron/renderer
        shell: bash
        run: |
          rm -rf electron/renderer
          mkdir -p electron/renderer
          cp -r artifacts/jarvis-ui/dist/public/. electron/renderer/

      - name: Generate app icons
        run: |
          pip install pillow --quiet
          python scripts/make_icon.py electron/assets

      - name: Verify icons
        shell: bash
        run: |
          test -f electron/assets/jarvis.ico || (echo "❌ jarvis.ico missing" && exit 1)
          test -f electron/assets/tray-icon.png || (echo "❌ tray-icon.png missing" && exit 1)
          echo "✅ Icons OK"

      - name: Install Python deps
        run: pip install -r desktop/requirements.txt
        continue-on-error: true

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Build Windows installer (skip build:ui — already done above)
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsc -p tsconfig.json && npx electron-builder --win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-Windows
          path: |
            electron/dist-app/*.exe
            electron/dist-app/*.blockmap
            electron/dist-app/latest.yml
          if-no-files-found: warn

  # ─── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: 🍎 macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Patch workspace for CI
        run: cp ci-pnpm-workspace.yaml pnpm-workspace.yaml

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build API Server
        run: pnpm --filter @workspace/api-server run build

      - name: Copy API Server → electron/api-server
        run: |
          mkdir -p electron/api-server
          cp artifacts/api-server/dist/index.js electron/api-server/

      - name: Build React UI
        run: pnpm --filter @workspace/jarvis-ui run build
        env:
          BASE_PATH: "./"

      - name: Copy React UI → electron/renderer
        run: |
          rm -rf electron/renderer
          mkdir -p electron/renderer
          cp -r artifacts/jarvis-ui/dist/public/. electron/renderer/

      - name: Generate app icons
        run: pip install pillow --quiet && python scripts/make_icon.py electron/assets

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Build macOS DMG
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsc -p tsconfig.json && npx electron-builder --mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-macOS
          path: |
            electron/dist-app/*.dmg
            electron/dist-app/*.blockmap
            electron/dist-app/latest-mac.yml
          if-no-files-found: warn

  # ─── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    name: 🐧 Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Patch workspace for CI
        run: cp ci-pnpm-workspace.yaml pnpm-workspace.yaml

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build API Server
        run: pnpm --filter @workspace/api-server run build

      - name: Copy API Server → electron/api-server
        run: |
          mkdir -p electron/api-server
          cp artifacts/api-server/dist/index.js electron/api-server/

      - name: Build React UI
        run: pnpm --filter @workspace/jarvis-ui run build
        env:
          BASE_PATH: "./"

      - name: Copy React UI → electron/renderer
        run: |
          rm -rf electron/renderer
          mkdir -p electron/renderer
          cp -r artifacts/jarvis-ui/dist/public/. electron/renderer/

      - name: Generate app icons
        run: pip install pillow --quiet && python scripts/make_icon.py electron/assets

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Build Linux AppImage
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsc -p tsconfig.json && npx electron-builder --linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-Linux
          path: |
            electron/dist-app/*.AppImage
            electron/dist-app/latest-linux.yml
          if-no-files-found: warn

  # ─── Upload to Release ──────────────────────────────────────────────────────
  upload-to-release:
    name: 📦 Upload installers → GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: List files to upload
        run: find release-files -type f | sort

      - name: Upload installers to existing GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.version }}
          # Не перезаписываем описание релиза — только добавляем файлы
          body: ""
          append_body: false
          fail_on_unmatched_files: false
          files: |
            release-files/*.exe
            release-files/*.dmg
            release-files/*.AppImage
            release-files/*.blockmap
            release-files/latest.yml
            release-files/latest-mac.yml
            release-files/latest-linux.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
