name: Dev Build Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install pnpm
        run: npm install -g pnpm@9
      - name: Patch pnpm-workspace.yaml for CI
        run: |
          cat > pnpm-workspace.yaml << 'WSEOF'
          packages:
            - artifacts/*
            - lib/*
            - scripts
          catalog:
            '@replit/vite-plugin-cartographer': ^0.5.1
            '@replit/vite-plugin-dev-banner': ^0.1.1
            '@replit/vite-plugin-runtime-error-modal': ^0.0.6
            '@tailwindcss/vite': ^4.1.14
            '@tanstack/react-query': ^5.90.21
            '@types/node': ^25.3.3
            '@types/react': ^19.2.0
            '@types/react-dom': ^19.2.0
            '@vitejs/plugin-react': ^5.0.4
            class-variance-authority: ^0.7.1
            clsx: ^2.1.1
            drizzle-orm: ^0.45.2
            framer-motion: ^12.23.24
            lucide-react: ^0.545.0
            react: 19.1.0
            react-dom: 19.1.0
            tailwind-merge: ^3.3.1
            tailwindcss: ^4.1.14
            tsx: ^4.21.0
            vite: ^7.3.2
            wouter: ^3.3.5
            zod: ^3.25.76
          autoInstallPeers: false
          onlyBuiltDependencies:
            - '@swc/core'
            - esbuild
            - msw
          WSEOF
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run typecheck

  python-check:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install fastapi uvicorn pydantic psutil
      - run: python -m py_compile desktop/core/main.py
      - run: python -m py_compile desktop/core/voice_engine.py
      - run: python -m py_compile desktop/core/learning.py
