name: Build JARVIS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  # ─── Build Windows .exe ──────────────────────────────────────────────────
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Patch pnpm-workspace.yaml for CI
        shell: bash
        run: |
          cat > pnpm-workspace.yaml << 'WSEOF'
          packages:
            - artifacts/*
            - lib/*
            - scripts
          catalog:
            '@replit/vite-plugin-cartographer': ^0.5.1
            '@replit/vite-plugin-dev-banner': ^0.1.1
            '@replit/vite-plugin-runtime-error-modal': ^0.0.6
            '@tailwindcss/vite': ^4.1.14
            '@tanstack/react-query': ^5.90.21
            '@types/node': ^25.3.3
            '@types/react': ^19.2.0
            '@types/react-dom': ^19.2.0
            '@vitejs/plugin-react': ^5.0.4
            class-variance-authority: ^0.7.1
            clsx: ^2.1.1
            drizzle-orm: ^0.45.2
            framer-motion: ^12.23.24
            lucide-react: ^0.545.0
            react: 19.1.0
            react-dom: 19.1.0
            tailwind-merge: ^3.3.1
            tailwindcss: ^4.1.14
            tsx: ^4.21.0
            vite: ^7.3.2
            wouter: ^3.3.5
            zod: ^3.25.76
          autoInstallPeers: false
          onlyBuiltDependencies:
            - '@swc/core'
            - esbuild
            - msw
          WSEOF

      - name: Install pnpm deps
        run: pnpm install --no-frozen-lockfile

      - name: Build React UI
        run: pnpm --filter @workspace/jarvis-ui run build

      - name: Install Python + setuptools
        run: pip install setuptools wheel pyinstaller
        continue-on-error: true

      - name: Install Python app deps
        run: pip install -r desktop/requirements.txt
        continue-on-error: true

      - name: Install Electron deps
        working-directory: electron
        run: npm install

      - name: Build Electron Windows installer
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-Windows
          path: |
            electron/dist-app/*.exe
            electron/dist-app/*.msi
          if-no-files-found: warn
          retention-days: 30

  # ─── Build macOS .dmg ────────────────────────────────────────────────────
  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Patch pnpm-workspace.yaml for CI
        run: |
          cat > pnpm-workspace.yaml << 'WSEOF'
          packages:
            - artifacts/*
            - lib/*
            - scripts
          catalog:
            '@replit/vite-plugin-cartographer': ^0.5.1
            '@replit/vite-plugin-dev-banner': ^0.1.1
            '@replit/vite-plugin-runtime-error-modal': ^0.0.6
            '@tailwindcss/vite': ^4.1.14
            '@tanstack/react-query': ^5.90.21
            '@types/node': ^25.3.3
            '@types/react': ^19.2.0
            '@types/react-dom': ^19.2.0
            '@vitejs/plugin-react': ^5.0.4
            class-variance-authority: ^0.7.1
            clsx: ^2.1.1
            drizzle-orm: ^0.45.2
            framer-motion: ^12.23.24
            lucide-react: ^0.545.0
            react: 19.1.0
            react-dom: 19.1.0
            tailwind-merge: ^3.3.1
            tailwindcss: ^4.1.14
            tsx: ^4.21.0
            vite: ^7.3.2
            wouter: ^3.3.5
            zod: ^3.25.76
          autoInstallPeers: false
          onlyBuiltDependencies:
            - '@swc/core'
            - esbuild
            - msw
          WSEOF

      - name: Install pnpm deps
        run: pnpm install --no-frozen-lockfile

      - name: Build React UI
        run: pnpm --filter @workspace/jarvis-ui run build

      - name: Install Electron deps
        working-directory: electron
        run: npm install

      - name: Build Electron macOS DMG
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-macOS
          path: |
            electron/dist-app/*.dmg
            electron/dist-app/*.zip
          if-no-files-found: warn
          retention-days: 30

  # ─── Build Linux AppImage ────────────────────────────────────────────────
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Patch pnpm-workspace.yaml for CI
        run: |
          cat > pnpm-workspace.yaml << 'WSEOF'
          packages:
            - artifacts/*
            - lib/*
            - scripts
          catalog:
            '@replit/vite-plugin-cartographer': ^0.5.1
            '@replit/vite-plugin-dev-banner': ^0.1.1
            '@replit/vite-plugin-runtime-error-modal': ^0.0.6
            '@tailwindcss/vite': ^4.1.14
            '@tanstack/react-query': ^5.90.21
            '@types/node': ^25.3.3
            '@types/react': ^19.2.0
            '@types/react-dom': ^19.2.0
            '@vitejs/plugin-react': ^5.0.4
            class-variance-authority: ^0.7.1
            clsx: ^2.1.1
            drizzle-orm: ^0.45.2
            framer-motion: ^12.23.24
            lucide-react: ^0.545.0
            react: 19.1.0
            react-dom: 19.1.0
            tailwind-merge: ^3.3.1
            tailwindcss: ^4.1.14
            tsx: ^4.21.0
            vite: ^7.3.2
            wouter: ^3.3.5
            zod: ^3.25.76
          autoInstallPeers: false
          onlyBuiltDependencies:
            - '@swc/core'
            - esbuild
            - msw
          WSEOF

      - name: Install pnpm deps
        run: pnpm install --no-frozen-lockfile

      - name: Build React UI
        run: pnpm --filter @workspace/jarvis-ui run build

      - name: Install Electron deps
        working-directory: electron
        run: npm install

      - name: Build Linux AppImage
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-Linux
          path: |
            electron/dist-app/*.AppImage
            electron/dist-app/*.deb
          if-no-files-found: warn
          retention-days: 30

  # ─── Create GitHub Release (runs even if some builds failed) ─────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    # Run if tag push, regardless of individual build results
    if: always() && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
        continue-on-error: true

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: List available release assets
        run: find release-assets -type f 2>/dev/null || echo "No assets downloaded"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "JARVIS v${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## JARVIS AI Ассистент v${{ steps.get_version.outputs.VERSION }}

            ### Скачать установщик

            | Платформа | Скачать |
            |-----------|---------|
            | 🪟 Windows 10/11 | `JARVIS-Setup-*.exe` |
            | 🍎 macOS 12+ | `JARVIS-*.dmg` |
            | 🐧 Linux | `JARVIS-*.AppImage` |

            ### Установка (Windows)
            1. Скачайте `JARVIS-Setup-*.exe`
            2. Нажмите "Всё равно запустить" в SmartScreen
            3. JARVIS установится и запустится в системном трее
            4. Установите Ollama: https://ollama.ai → `ollama pull llama3:8b`
            5. Скажите **«Джарвис»** или нажмите **Ctrl+Shift+J**

            ### Возможности
            - 🎙️ Всегда активен — не нужно нажимать кнопки
            - 🧠 Самообучение — запоминает ваше имя, предпочтения, факты
            - 🤖 Локальный AI (Ollama + llama3:8b) — без интернета
            - 💻 Запуск приложений голосом или текстом
            - 📊 Аналитика YouTube/TikTok
            - 🔒 Все данные хранятся локально (~/.jarvis/)

            ### Лицензионные ключи
            - **Демо:** `JARVIS-DEMO-TEST-2024`
            - **Пробная (30 дней):** `JARVIS-XXXX-XXXX-XXXX`
            - **Постоянная:** `JARVIS-PERM-XXXX-XXXX`

            ### Системные требования
            - ОЗУ: 8 ГБ+ (16 ГБ рекомендуется)
            - Диск: 10 ГБ (для AI моделей)
            - ОС: Windows 10/11, macOS 12+, Ubuntu 20.04+
          files: |
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.dmg
            release-assets/**/*.zip
            release-assets/**/*.AppImage
            release-assets/**/*.deb
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
