name: Build JARVIS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  # ─── Build Windows .exe ──────────────────────────────────────────────────
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install pnpm deps
        run: pnpm install --no-frozen-lockfile

      - name: Install Python deps
        run: pip install -r desktop/requirements.txt pyinstaller

      - name: Build Python core .exe
        working-directory: desktop
        run: python build_windows.py

      - name: Build React UI
        run: pnpm --filter @workspace/jarvis-ui run build

      - name: Install Electron deps
        working-directory: electron
        run: npm install

      - name: Build Electron Windows installer
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-Windows
          path: electron/dist-app/*.exe
          retention-days: 30

  # ─── Build macOS .dmg ────────────────────────────────────────────────────
  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install pnpm deps
        run: pnpm install --no-frozen-lockfile

      - name: Install Python deps
        run: pip3 install -r desktop/requirements.txt pyinstaller

      - name: Build Python core .exe (macOS)
        working-directory: desktop
        run: python3 build_windows.py

      - name: Build React UI
        run: pnpm --filter @workspace/jarvis-ui run build

      - name: Install Electron deps
        working-directory: electron
        run: npm install

      - name: Build Electron macOS DMG
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-macOS
          path: electron/dist-app/*.dmg
          retention-days: 30

  # ─── Build Linux AppImage ────────────────────────────────────────────────
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install system deps
        run: sudo apt-get install -y python3-pip python3-dev portaudio19-dev

      - name: Install pnpm deps
        run: pnpm install --no-frozen-lockfile

      - name: Install Python deps
        run: pip3 install -r desktop/requirements.txt pyinstaller

      - name: Build Python core (Linux)
        working-directory: desktop
        run: python3 build_windows.py

      - name: Build React UI
        run: pnpm --filter @workspace/jarvis-ui run build

      - name: Install Electron deps
        working-directory: electron
        run: npm install

      - name: Build Linux AppImage
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-Linux
          path: electron/dist-app/*.AppImage
          retention-days: 30

  # ─── Create GitHub Release ───────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "JARVIS v${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## JARVIS AI Assistant v${{ steps.get_version.outputs.VERSION }}

            ### Установка

            | Платформа | Файл | Размер |
            |-----------|------|--------|
            | Windows 10/11 | JARVIS-Setup-*.exe | ~150MB |
            | macOS 12+ | JARVIS-*.dmg | ~200MB |
            | Linux (AppImage) | JARVIS-*.AppImage | ~180MB |

            ### Первый запуск
            1. Скачайте установщик для своей платформы
            2. Запустите установщик (Windows может потребовать права администратора)
            3. Запустите JARVIS и активируйте лицензионным ключом
            4. Установите Ollama: https://ollama.ai и выполните `ollama pull llama3:8b`
            5. Скажите «Джарвис» для активации или нажмите Ctrl+Shift+J

            ### Лицензионные ключи
            - **Пробная (30 дней):** начинается с `JARVIS-XXXX-XXXX-XXXX`
            - **Постоянная:** начинается с `JARVIS-PERM-XXXX-XXXX`
            - Демо-ключ для теста: `JARVIS-DEMO-TEST-2024`

            ### Требования
            - 8 ГБ ОЗУ минимум (16 ГБ рекомендуется для AI моделей)
            - 10 ГБ дисковое пространство для AI моделей
            - Ollama с моделью llama3:8b
          files: |
            release-assets/JARVIS-Windows/*.exe
            release-assets/JARVIS-macOS/*.dmg
            release-assets/JARVIS-Linux/*.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
