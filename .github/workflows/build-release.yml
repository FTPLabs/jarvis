name: Build JARVIS Release

  on:
    push:
      tags:
        - "v*"
    workflow_dispatch:
      inputs:
        version:
          description: "Version to build (e.g. 1.0.2)"
          required: true
          default: "1.0.0"

  permissions:
    contents: write

  jobs:
    # ─── Build Windows .exe ──────────────────────────────────────────────────
    build-windows:
      name: Build Windows Installer
      runs-on: windows-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: "20"

        - name: Setup pnpm
          uses: pnpm/action-setup@v4
          with:
            version: 9

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.11"

        - name: Patch pnpm-workspace.yaml for CI
          shell: bash
          run: |
            cat > pnpm-workspace.yaml << 'WSEOF'
            packages:
              - artifacts/*
              - lib/*
              - scripts
            catalog:
              '@replit/vite-plugin-cartographer': ^0.5.1
              '@replit/vite-plugin-dev-banner': ^0.1.1
              '@replit/vite-plugin-runtime-error-modal': ^0.0.6
              '@tailwindcss/vite': ^4.1.14
              '@tanstack/react-query': ^5.90.21
              '@types/node': ^25.3.3
              '@types/react': ^19.2.0
              '@types/react-dom': ^19.2.0
              '@vitejs/plugin-react': ^5.0.4
              class-variance-authority: ^0.7.1
              clsx: ^2.1.1
              drizzle-orm: ^0.45.2
              framer-motion: ^12.23.24
              lucide-react: ^0.545.0
              react: 19.1.0
              react-dom: 19.1.0
              tailwind-merge: ^3.3.1
              tailwindcss: ^4.1.14
              tsx: ^4.21.0
              vite: ^7.3.2
              wouter: ^3.3.5
              zod: ^3.25.76
            autoInstallPeers: false
            onlyBuiltDependencies:
              - '@swc/core'
              - esbuild
              - msw
            WSEOF

        - name: Install pnpm deps
          run: pnpm install --no-frozen-lockfile

        - name: Build React UI
          run: pnpm --filter @workspace/jarvis-ui run build

        - name: Copy React UI to Electron renderer
          shell: bash
          run: |
            mkdir -p electron/renderer
            cp -r artifacts/jarvis-ui/dist/. electron/renderer/

        - name: Install Pillow for icon generation
          run: pip install pillow

        - name: Generate JARVIS icons
          run: python scripts/make_icon.py electron/assets

        - name: Verify icons exist
          shell: bash
          run: |
            echo "--- Иконки ---"
            ls -la electron/assets/
            test -f electron/assets/jarvis.ico || (echo "ОШИБКА: jarvis.ico не найден" && exit 1)
            test -f electron/assets/tray-icon.png || (echo "ОШИБКА: tray-icon.png не найден" && exit 1)
            echo "Все иконки на месте ✅"

        - name: Install Python + setuptools
          run: pip install setuptools wheel pyinstaller
          continue-on-error: true

        - name: Install Python app deps
          run: pip install -r desktop/requirements.txt
          continue-on-error: true

        - name: Install Electron deps
          working-directory: electron
          run: npm install

        - name: Build Electron Windows installer
          working-directory: electron
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
            CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          run: npm run build:win

        - name: Upload Windows artifacts
          uses: actions/upload-artifact@v4
          with:
            name: JARVIS-Windows
            path: electron/dist-app/

    # ─── Build macOS .dmg ────────────────────────────────────────────────────
    build-macos:
      name: Build macOS DMG
      runs-on: macos-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: "20"

        - name: Setup pnpm
          uses: pnpm/action-setup@v4
          with:
            version: 9

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.11"

        - name: Patch pnpm-workspace.yaml for CI
          run: |
            cat > pnpm-workspace.yaml << 'WSEOF'
            packages:
              - artifacts/*
              - lib/*
              - scripts
            catalog:
              '@replit/vite-plugin-cartographer': ^0.5.1
              '@replit/vite-plugin-dev-banner': ^0.1.1
              '@replit/vite-plugin-runtime-error-modal': ^0.0.6
              '@tailwindcss/vite': ^4.1.14
              '@tanstack/react-query': ^5.90.21
              '@types/node': ^25.3.3
              '@types/react': ^19.2.0
              '@types/react-dom': ^19.2.0
              '@vitejs/plugin-react': ^5.0.4
              class-variance-authority: ^0.7.1
              clsx: ^2.1.1
              drizzle-orm: ^0.45.2
              framer-motion: ^12.23.24
              lucide-react: ^0.545.0
              react: 19.1.0
              react-dom: 19.1.0
              tailwind-merge: ^3.3.1
              tailwindcss: ^4.1.14
              tsx: ^4.21.0
              vite: ^7.3.2
              wouter: ^3.3.5
              zod: ^3.25.76
            autoInstallPeers: false
            onlyBuiltDependencies:
              - '@swc/core'
              - esbuild
              - msw
            WSEOF

        - name: Install pnpm deps
          run: pnpm install --no-frozen-lockfile

        - name: Build React UI
          run: pnpm --filter @workspace/jarvis-ui run build

        - name: Copy React UI to Electron renderer
          run: |
            mkdir -p electron/renderer
            cp -r artifacts/jarvis-ui/dist/. electron/renderer/

        - name: Install Pillow and generate icons
          run: pip install pillow && python scripts/make_icon.py electron/assets

        - name: Install Electron deps
          working-directory: electron
          run: npm install

        - name: Build Electron macOS DMG
          working-directory: electron
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: npm run build:mac

        - name: Upload macOS artifacts
          uses: actions/upload-artifact@v4
          with:
            name: JARVIS-macOS
            path: electron/dist-app/

    # ─── Build Linux .AppImage ───────────────────────────────────────────────
    build-linux:
      name: Build Linux AppImage
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: "20"

        - name: Setup pnpm
          uses: pnpm/action-setup@v4
          with:
            version: 9

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.11"

        - name: Patch pnpm-workspace.yaml for CI
          run: |
            cat > pnpm-workspace.yaml << 'WSEOF'
            packages:
              - artifacts/*
              - lib/*
              - scripts
            catalog:
              '@replit/vite-plugin-cartographer': ^0.5.1
              '@replit/vite-plugin-dev-banner': ^0.1.1
              '@replit/vite-plugin-runtime-error-modal': ^0.0.6
              '@tailwindcss/vite': ^4.1.14
              '@tanstack/react-query': ^5.90.21
              '@types/node': ^25.3.3
              '@types/react': ^19.2.0
              '@types/react-dom': ^19.2.0
              '@vitejs/plugin-react': ^5.0.4
              class-variance-authority: ^0.7.1
              clsx: ^2.1.1
              drizzle-orm: ^0.45.2
              framer-motion: ^12.23.24
              lucide-react: ^0.545.0
              react: 19.1.0
              react-dom: 19.1.0
              tailwind-merge: ^3.3.1
              tailwindcss: ^4.1.14
              tsx: ^4.21.0
              vite: ^7.3.2
              wouter: ^3.3.5
              zod: ^3.25.76
            autoInstallPeers: false
            onlyBuiltDependencies:
              - '@swc/core'
              - esbuild
              - msw
            WSEOF

        - name: Install pnpm deps
          run: pnpm install --no-frozen-lockfile

        - name: Build React UI
          run: pnpm --filter @workspace/jarvis-ui run build

        - name: Copy React UI to Electron renderer
          run: |
            mkdir -p electron/renderer
            cp -r artifacts/jarvis-ui/dist/. electron/renderer/

        - name: Install Pillow and generate icons
          run: pip install pillow && python scripts/make_icon.py electron/assets

        - name: Install Electron deps
          working-directory: electron
          run: npm install

        - name: Build Electron Linux AppImage
          working-directory: electron
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: npm run build:linux

        - name: Upload Linux artifacts
          uses: actions/upload-artifact@v4
          with:
            name: JARVIS-Linux
            path: electron/dist-app/

    # ─── Create GitHub Release ───────────────────────────────────────────────
    create-release:
      name: Create GitHub Release
      needs: [build-windows, build-macos, build-linux]
      runs-on: ubuntu-latest
      if: startsWith(github.ref, 'refs/tags/')
      steps:
        - name: Download all artifacts
          uses: actions/download-artifact@v4
          with:
            path: release-artifacts

        - name: Create Release
          uses: softprops/action-gh-release@v2
          with:
            files: release-artifacts/**/*
            generate_release_notes: true
            draft: false
            prerelease: false
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  